name: LivingColor Evolution Weekly

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      plugin_skills_ref:
        description: 'Validated livingcolor-skills ref for the plugin lock bump'
        required: false
        type: string
      plugin_skills_commit:
        description: 'Resolved livingcolor-skills commit SHA for the plugin lock bump'
        required: false
        type: string

jobs:
  curator:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.plugin_skills_ref == '' || inputs.plugin_skills_commit == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: Tamsi/livingcolor-skills
          path: livingcolor-skills
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install livingcolor-skills dependencies
        working-directory: livingcolor-skills
        run: pnpm install --frozen-lockfile

      - name: Build livingcolor-skills
        working-directory: livingcolor-skills
        run: pnpm build

      - name: Link livingcolor-skills for curator overrides
        run: ln -sfn "${{ github.workspace }}/livingcolor-skills" "${{ github.workspace }}/../livingcolor-skills"

      - name: Install curator
        run: pnpm install --frozen-lockfile

      - name: Build curator
        run: pnpm build

      - name: Run curator pipeline
        env:
          CURATOR_SKILLS_PATH: ${{ github.workspace }}/livingcolor-skills/registry
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURATOR_TARGET_REPO: Tamsi/livingcolor-skills
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HERMES_LLM_PROVIDER: anthropic
          CURATOR_MOCK_LLM: ${{ secrets.ANTHROPIC_API_KEY == '' && 'true' || '' }}
        run: pnpm curator pr

  plugin-lock-bump:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.plugin_skills_ref != '' && inputs.plugin_skills_commit != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: Tamsi/livingcolor-skills
          path: livingcolor-skills
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install livingcolor-skills dependencies
        working-directory: livingcolor-skills
        run: pnpm install --frozen-lockfile

      - name: Build livingcolor-skills
        working-directory: livingcolor-skills
        run: pnpm build

      - name: Link livingcolor-skills for curator overrides
        run: ln -sfn "${{ github.workspace }}/livingcolor-skills" "${{ github.workspace }}/../livingcolor-skills"

      - name: Install curator
        run: pnpm install --frozen-lockfile

      - name: Build curator
        run: pnpm build

      - name: Open plugin lock bump PR
        env:
          # This token must have contents:write and pull_requests:write on Tamsi/livingcolor-plugin.
          GITHUB_TOKEN: ${{ secrets.LIVINGCOLOR_PLUGIN_PR_TOKEN }}
          CURATOR_PLUGIN_TARGET_REPO: Tamsi/livingcolor-plugin
        run: pnpm curator plugin-bump --skills-ref "${{ inputs.plugin_skills_ref }}" --resolved-commit "${{ inputs.plugin_skills_commit }}"
